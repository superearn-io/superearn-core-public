# Full reference https://github.com/foundry-rs/foundry/tree/master/crates/config

[profile.default]
  auto_detect_solc = true
  bytecode_hash = "none"
  evm_version = "Cancun"
  fuzz = { runs = 1_000 }
  gas_reports = ["*"]
  optimizer = true
  optimizer_runs = 250
  out = "out"
  solc = "0.8.29"
  src = "src"
  via_ir = true
  libs = ["node_modules", "lib"]
  gas_estimate_multiplier = 115
  priority_gas_price = 1_000_000_000
  fs_permissions = [
    { access = "read", path = "./out" },
  ]

[profile.fast]
optimizer = false
via_ir = false
bytecode_hash = "none"
cbor_metadata = false
build_info = false

[profile.size]
optimizer = true
optimizer_runs = 1
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

[fmt]
  bracket_spacing = true
  int_types = "long"
  line_length = 120
  multiline_func_header = "all"
  number_underscore = "thousands"
  quote_style = "double"
  tab_width = 4
  wrap_comments = true

[rpc_endpoints]
  kaia_mainnet = "https://public-en.node.kaia.io"
  mainnet = "https://eth.llamarpc.com"
